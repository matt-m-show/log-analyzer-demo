# credentials.json is mounted read-only; token.json is mounted read-write for the scheduler
# so it can refresh and persist OAuth tokens without host-side intervention.
# Before running `docker compose up`, ensure both files exist:
#   credentials.json — OAuth client secrets downloaded from Google Cloud Console
#   token.json       — generated on first run via `python auth/test_auth.py` on the host

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json:rw
      - alerts:/app/logs
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - alerts:/app/logs
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  alerts:
